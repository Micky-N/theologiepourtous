title: "Théologie Vivante - site officiel"
description: "Formation théologique accessible à tous, fondée sur les Écritures. Approfondissez votre connaissance de Dieu avec nos enseignements structurés."

hero:
  badge:
    icon: "i-lucide-cross"
    text: "Formation théologique en ligne"
  title: "Approfondissez votre"
  titleHighlight: "Connaissance de Dieu"
  subtitle: "Une formation théologique accessible à tous, fondée sur les Écritures et guidée par l'Esprit Saint. Découvrez les richesses de la Parole de Dieu dans un parcours structuré et inspirant."
  primaryCta:
    text: "Commencer le parcours"
    icon: "i-lucide-book-open"
    link: "/enseignements"
  secondaryCta:
    text: "En savoir plus"
    icon: "i-lucide-play-circle"
    link: "/about"

mission:
  badge:
    icon: "i-lucide-heart"
    text: "Notre Mission"
  title: "Équiper les saints pour l'œuvre du ministère"
  subtitle: "Notre passion est de rendre la théologie accessible à tous les chrétiens, afin qu'ils puissent grandir dans la connaissance de Dieu et servir efficacement dans Son royaume."
  pillars:
    - title: "Enseignement Biblique"
      icon: "i-lucide-book-open"
      color: "blue"
      description: "Des cours fondés sur l'autorité des Écritures, enseignés avec fidélité et clarté pour nourrir votre âme et fortifier votre foi."
    - title: "Communauté"
      icon: "i-lucide-users"
      color: "green"
      description: "Rejoignez une communauté de croyants passionnés par l'étude de la Parole, où l'encouragement mutuel et la croissance spirituelle sont prioritaires."
    - title: "Formation Pratique"
      icon: "i-lucide-compass"
      color: "purple"
      description: "Une approche pratique de la théologie qui vous équipe pour le ministère et vous aide à appliquer la vérité biblique dans votre vie quotidienne."
  verse:
    text: "Étudie-toi à te présenter devant Dieu comme un homme éprouvé"
    reference: "2 Timothée 2:15"
    commentary: "Notre désir est de vous accompagner dans cette noble quête de connaissance biblique, pour que vous deveniez des ouvriers qui n'ont point à rougir."

teachings:
  badge:
    icon: "i-lucide-graduation-cap"
    text: "Nos Enseignements"
  title: "Parcours de Formation Théologique"
  subtitle: "Explorez les grandes doctrines de la foi chrétienne à travers nos parcours structurés et approfondissez votre compréhension des vérités bibliques fondamentales."
  allCoursesCard:
    title: "Voir tous les parcours"
    description: "Découvrez l'ensemble de nos formations théologiques et choisissez votre parcours d'apprentissage."
    cta: "Parcourir tout"
    link: "/enseignements"

testimonials:
  badge:
    icon: "i-lucide-quote"
    text: "Témoignages"
  title: "Ce que disent nos étudiants"
  subtitle: "Découvrez comment la formation théologique a transformé la vie et le ministère de ceux qui nous ont fait confiance."
  reviews:
    - name: "Marie Dubois"
      role: "Pasteure adjointe"
      image: "https://placehold.co/1200x630?text=Marie+Dubois"
      quote: "Cette formation m'a permis d'approfondir ma compréhension des Écritures d'une manière que je n'aurais jamais imaginée. Les enseignements sont riches, accessibles et profondément ancrés dans la Parole de Dieu."
    - name: "Pierre Martin"
      role: "Enseignant biblique"
      image: "https://placehold.co/1200x630?text=Pierre+Martin"
      quote: "J'ai particulièrement apprécié l'approche systématique et la qualité pédagogique. Ces études m'ont équipé pour enseigner avec plus de confiance et de précision dans mon ministère local."
    - name: "Sarah Leroux"
      role: "Responsable jeunesse"
      image: "https://placehold.co/1200x630?text=Sarah+Leroux"
      quote: "Une formation qui allie profondeur théologique et application pratique. Mon ministère auprès des jeunes s'en trouve enrichi et ma foi fortifiée. Je recommande vivement ce parcours."

